name: Sync upstream

on:
  schedule:
    - cron: '17 3 * * *'
      timezone: Asia/Shanghai
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      changed: ${{ steps.merge.outputs.changed }}

    steps:
      - name: Checkout custom branch
        uses: actions/checkout@v6
        with:
          ref: custom
          fetch-depth: 0

      - name: Merge upstream main
        id: merge
        shell: bash
        run: |
          set -euo pipefail

          git remote add upstream https://github.com/Wei-Shaw/sub2api.git
          git fetch --prune upstream main

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          BEFORE="$(git rev-parse HEAD)"
          # Prefer custom-branch customizations on textual conflicts
          # (e.g. deploy/docker-compose.yml default image / GHCR envs).
          git merge -X ours --no-edit upstream/main
          AFTER="$(git rev-parse HEAD)"

          if [ "$BEFORE" = "$AFTER" ]; then
            echo "No new commits from upstream/main; skip push and image build."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git push origin HEAD:custom
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "Merged and pushed: ${BEFORE} -> ${AFTER}"

  build-custom-image:
    needs: sync
    if: needs.sync.outputs.changed == 'true'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-custom-image.yml
    with:
      ref: custom
